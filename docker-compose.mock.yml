services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.mock
      args:
        REGISTRY: ${REGISTRY:-}
    command: node mock_server.js
    env_file: .env.mock
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        REGISTRY: ${REGISTRY:-}
    ports:
      - "8085:80"
    depends_on:
      backend:
        condition: service_healthy
